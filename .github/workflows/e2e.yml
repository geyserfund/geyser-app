name: E2E
on:
  pull_request:
    branches:
      - 'main'
jobs:
  playwright-chromium:
    runs-on: ubuntu-22.04
    name: Playwright Chromium
    timeout-minutes: 45
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CONTRIBUTOR_LND_ENDPOINT: ${{ secrets.CONTRIBUTOR_LND_ENDPOINT }}
      CONTRIBUTOR_LND_ADMIN_MACAROON_HEX: ${{ secrets.CONTRIBUTOR_LND_ADMIN_MACAROON_HEX }}
      MINE_BLOCK_ADDRESS: ${{ secrets.MINE_BLOCK_ADDRESS }}
      BITCOIND_ENDPOINT: ${{ secrets.BITCOIND_ENDPOINT }}
      BITCOIND_AUTH: ${{ secrets.BITCOIND_AUTH }}
      CI: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Playwright Chromium
        run: yarn workspace @geyser-app/testing exec playwright install --with-deps chromium

      - name: Run Playwright E2E (Chromium)
        run: yarn test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            packages/testing/playwright/playwright-report
            packages/testing/playwright/test-results
          if-no-files-found: ignore
